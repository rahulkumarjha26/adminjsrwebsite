<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin JSR Consulting – Hero Section Only</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,700;12..96,800&family=Manrope:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --font-display: 'Bricolage Grotesque', sans-serif;
            --font-body: 'Manrope', sans-serif;
            --font-mono: 'Courier New', monospace;

            --bg-primary: #F8F7F4;
            --bg-surface: #FFFFFF;
            --bg-elevated: #F1F0EC;
            --text-primary: #0F172A;
            --text-secondary: rgba(15, 23, 42, 0.68);
            --text-muted: rgba(15, 23, 42, 0.42);

            --accent: #6366F1;
            --accent-hover: #4F46E5;
            --accent-warm: #F59E0B;
            --accent-warm-hover: #D97706;
            --accent-rose: #F43F5E;
            --accent-emerald: #10B981;
            --accent-glow: rgba(99, 102, 241, 0.14);
            --accent-warm-glow: rgba(245, 158, 11, 0.12);

            --border: rgba(99, 102, 241, 0.08);
            --border-strong: rgba(99, 102, 241, 0.16);
            --shadow-sm: 0 1px 3px rgba(99, 102, 241, 0.05), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 30px rgba(99, 102, 241, 0.08), 0 4px 12px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 20px 60px rgba(99, 102, 241, 0.12), 0 8px 24px rgba(0, 0, 0, 0.05);
            --shadow-card: 0 4px 6px -1px rgba(99, 102, 241, 0.06), 0 20px 40px -5px rgba(99, 102, 241, 0.09);
            --grain-opacity: 0.035;
            --cursor-color: #0F172A;
            --cursor-ring: rgba(99, 102, 241, 0.18);

            --gradient-accent: linear-gradient(135deg, #6366F1, #3B82F6);
            --gradient-mixed: linear-gradient(135deg, #6366F1, #EC4899, #F59E0B);
        }

        [data-theme="dark"] {
            --bg-primary: #08081A;
            --bg-surface: #16162F;
            --bg-elevated: #212140;
            --text-primary: #F1F0EB;
            --text-secondary: rgba(241, 240, 235, 0.75);
            --text-muted: rgba(241, 240, 235, 0.45);

            --accent: #818CF8;
            --accent-hover: #A5B4FC;
            --accent-warm: #FBBF24;
            --accent-rose: #FB7185;
            --accent-emerald: #34D399;
            --accent-glow: rgba(129, 140, 248, 0.22);
            --border: rgba(129, 140, 248, 0.15);
            --border-strong: rgba(129, 140, 248, 0.25);
            --grain-opacity: 0.025;
            --cursor-color: #F1F0EB;
            --cursor-ring: rgba(129, 140, 248, 0.2);
        }

        body {
            margin: 0;
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: background-color 0.8s;
        }

        /* Essential Animations */
        @keyframes reveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes blobFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        @keyframes badgePulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Grain Overlay */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: var(--grain-opacity);
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        [data-theme="dark"] .grain-overlay {
            mix-blend-mode: screen;
        }

        /* Custom Cursor */
        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 6px;
            height: 6px;
            background-color: var(--cursor-color);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: background-color 0.3s;
        }

        .cursor-ring {
            position: fixed;
            top: 0;
            left: 0;
            width: 32px;
            height: 32px;
            border: 1.5px solid var(--cursor-ring);
            border-radius: 50%;
            z-index: 9998;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Navigation */
        .main-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 1.5rem 3rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .main-nav.scrolled {
            padding: 0.85rem 3rem;
            background: rgba(248, 247, 244, 0.88);
            backdrop-filter: blur(24px);
        }

        [data-theme="dark"] .main-nav.scrolled {
            background: rgba(8, 8, 26, 0.88);
        }

        .brand-mark {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
        }

        .brand-logo {
            height: 48px;
            width: auto;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            font-weight: 600;
            letter-spacing: 0.06em;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            text-decoration: none;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gradient-accent);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .nav-link:hover::after {
            transform: scaleX(1);
        }

        /* Theme Toggle */
        .theme-toggle-wrapper {
            scale: 0.7;
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .track {
            fill: #6366F1;
            transition: fill 0.8s;
        }

        [data-theme="dark"] .track {
            fill: #1e293b;
        }

        .knob {
            fill: #ffffff;
            transition: transform 0.8s;
        }

        [data-theme="dark"] .knob {
            transform: translateX(100px);
        }

        /* Hero Section */
        .main-hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 2rem 80px;
            overflow: hidden;
        }

        .hero-decorative-blobs {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: blobFloat 12s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -10%;
            right: -5%;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--accent-warm);
            bottom: 10%;
            left: -5%;
            animation-delay: -4s;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: var(--accent-rose);
            top: 50%;
            left: 20%;
            animation-delay: -8s;
        }

        .main-hero-content {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 0 auto;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 2.5rem;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-emerald);
            border-radius: 50%;
            position: relative;
        }

        .pulse-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border: 2px solid var(--accent-emerald);
            border-radius: 50%;
            animation: badgePulse 2s infinite;
        }

        .main-hero-title {
            font-family: var(--font-display);
            font-size: clamp(3.5rem, 8vw, 6.5rem);
            line-height: 0.95;
            font-weight: 300;
            color: var(--text-primary);
            margin-bottom: 2rem;
            letter-spacing: -0.04em;
        }

        .main-hero-title span {
            font-style: italic;
            background: var(--gradient-mixed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .main-hero-subtitle {
            font-family: var(--font-body);
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: var(--text-secondary);
            max-width: 800px;
            margin: 4rem auto 2.5rem;
            line-height: 1.5;
        }

        .main-hero-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
        }

        .hero-primary-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--gradient-accent);
            color: #fff !important;
            padding: 18px 36px;
            border-radius: 100px;
            font-weight: 600;
            box-shadow: 0 10px 30px var(--accent-glow);
            transition: all 0.4s ease;
            text-decoration: none;
        }

        .hero-secondary-btn {
            display: inline-flex;
            align-items: center;
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 18px 32px;
            border-radius: 100px;
            font-weight: 600;
            transition: all 0.4s ease;
            text-decoration: none;
        }

        @media (max-width: 767px) {
            .nav-links {
                display: none;
            }

            .main-hero {
                padding-top: 100px;
            }

            .hero-primary-btn,
            .hero-secondary-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="grain-overlay"></div>
    <div class="cursor-dot" id="c-dot"></div>
    <div class="cursor-ring" id="c-ring"></div>

    <nav class="main-nav" id="main-nav">
        <a href="#" class="brand-mark">
            <img src="logo.png" alt="Admin JSR Logo" class="brand-logo">
            <span>Admin JSR Consulting</span>
        </a>
        <ul class="nav-links">
            <li><a href="#" class="nav-link">About</a></li>
            <li><a href="#" class="nav-link">Services</a></li>
            <li><a href="#" class="nav-link">Portfolio</a></li>
            <li><a href="#" class="nav-link">Contact</a></li>
        </ul>
        <div class="nav-right">
            <label class="theme-toggle-wrapper">
                <input type="checkbox" id="theme-toggle" style="display:none">
                <svg viewBox="0 0 180 80" width="100" height="44">
                    <rect class="track" width="180" height="80" rx="40"></rect>
                    <circle class="knob" cx="40" cy="40" r="32"></circle>
                </svg>
            </label>
        </div>
    </nav>

    <section id="main-hero-section" class="main-hero">
        <div class="hero-decorative-blobs">
            <div class="blob shape-1"></div>
            <div class="blob shape-2"></div>
            <div class="blob shape-3"></div>
        </div>
        <div class="main-hero-content">
            <div class="hero-badge scroll-reveal delay-1">
                <div class="pulse-dot"></div>
                LIVE PROJECT PREVIEW
            </div>
            <h1 class="main-hero-title scroll-reveal delay-2">
                We Help <span>Global Brands</span> Scale Faster with <span>Zero-Error</span> Localization.
            </h1>
            <h2 class="main-hero-subtitle scroll-reveal delay-3">
                Experience the premium "Luminous Precision" design system.
            </h2>
            <div class="main-hero-actions scroll-reveal delay-5">
                <a href="#" class="hero-primary-btn">Explore Features</a>
                <a href="#" class="hero-secondary-btn">View Full Site</a>
            </div>
        </div>
    </section>

    <script>
        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('change', () => {
            document.documentElement.setAttribute('data-theme', themeToggle.checked ? 'dark' : 'light');
        });

        // Custom Cursor
        const cDot = document.getElementById('c-dot');
        const cRing = document.getElementById('c-ring');
        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let ringX = mouseX, ringY = mouseY;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            cDot.style.left = `${mouseX}px`;
            cDot.style.top = `${mouseY}px`;
        });

        function animateCursor() {
            ringX += (mouseX - ringX) * 0.15;
            ringY += (mouseY - ringY) * 0.15;
            cRing.style.left = `${ringX}px`;
            cRing.style.top = `${ringY}px`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Scroll Effects
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('main-nav');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });

        // Initial reveal
        document.querySelectorAll('.scroll-reveal').forEach(el => el.classList.add('visible'));
    </script>
</body>

</html>
